name: Release Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' AIUsage/Info.plist)"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Validate version matches Info.plist
        shell: bash
        run: |
          PROJECT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' AIUsage/Info.plist)"

          if [[ "$PROJECT_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "Tag version does not match AIUsage/Info.plist"
            echo "Tag/version: ${{ steps.version.outputs.version }}"
            echo "Info.plist:  $PROJECT_VERSION"
            exit 1
          fi

      - name: Build macOS release artifacts
        shell: bash
        run: |
          ./scripts/package-release.sh "${{ steps.version.outputs.version }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIUsage-${{ steps.version.outputs.version }}-macOS
          path: |
            dist/AIUsage-${{ steps.version.outputs.version }}-macOS.zip
            dist/AIUsage-${{ steps.version.outputs.version }}-macOS.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/AIUsage-${{ steps.version.outputs.version }}-macOS.zip
            dist/AIUsage-${{ steps.version.outputs.version }}-macOS.dmg
